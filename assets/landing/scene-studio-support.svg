<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="1" stop-color="#070B12"/>
    </linearGradient>
    <radialGradient id="glowA" cx="55%" cy="35%" r="70%">
      <stop offset="0" stop-color="#34D4FF" stop-opacity="0.14"/>
      <stop offset="0.6" stop-color="#7CFF4F" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#34D4FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#22304A" stroke-opacity="0.16" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34D4FF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#7CFF4F" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowA)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- minimal center shield -->
  <g transform="translate(800 440)" filter="url(#softGlow)" opacity="0.96">
    <path d="M0 -160 C 82 -130, 142 -114, 206 -104
             C 206 35, 142 140, 0 204
             C -142 140, -206 35, -206 -104
             C -142 -114, -82 -130, 0 -160 Z"
          fill="#0D1220" stroke="url(#stroke)" stroke-opacity="0.55" stroke-width="3"/>
    <path d="M-58 6 L-18 46 L84 -58" fill="none" stroke="#7CFF4F" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- minimal side status chips (no text) -->
  <g opacity="0.6">
    <rect x="250" y="280" width="260" height="14" rx="7" fill="#99A3BD" opacity="0.12"/>
    <rect x="250" y="304" width="170" height="14" rx="7" fill="#34D4FF" opacity="0.14"/>
    <rect x="1090" y="580" width="280" height="14" rx="7" fill="#99A3BD" opacity="0.12"/>
    <rect x="1210" y="604" width="180" height="14" rx="7" fill="#7CFF4F" opacity="0.14"/>
  </g>

  <!-- subtle halo ring -->
  <g filter="url(#softGlow)" opacity="0.55">
    <circle cx="800" cy="440" r="290" fill="none" stroke="#34D4FF" stroke-opacity="0.12" stroke-width="3"/>
    <circle cx="800" cy="440" r="320" fill="none" stroke="#7CFF4F" stroke-opacity="0.08" stroke-width="3"/>
  </g>

  <rect x="0" y="0" width="1600" height="900" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="130"/>
</svg>
