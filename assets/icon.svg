<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cubeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Isometric layered cube (USD layers metaphor) -->
  <g filter="url(#softShadow)" transform="translate(0, 8)">
    <!-- Top plate -->
    <path d="M256 118 L374 184 L256 250 L138 184 Z"
          fill="url(#cubeFill)" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round"/>
    <!-- Middle plate -->
    <path d="M256 176 L374 242 L256 308 L138 242 Z"
          fill="url(#cubeFill)" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round" opacity="0.92"/>
    <!-- Bottom plate -->
    <path d="M256 236 L374 302 L256 368 L138 302 Z"
          fill="url(#cubeFill)" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round" opacity="0.86"/>

    <!-- Vertical edges hint -->
    <path d="M138 184 L138 302" stroke="#0ea5b7" stroke-width="5" opacity="0.45"/>
    <path d="M374 184 L374 302" stroke="#0ea5b7" stroke-width="5" opacity="0.45"/>
    <path d="M256 250 L256 368" stroke="#0ea5b7" stroke-width="5" opacity="0.35"/>

    <!-- Validation check -->
    <path d="M206 298 L242 332 L318 252"
          fill="none" stroke="#22c55e" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

