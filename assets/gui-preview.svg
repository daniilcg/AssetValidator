<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f201b"/>
      <stop offset="1" stop-color="#272822"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#31322c"/>
      <stop offset="1" stop-color="#262822"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b4f037"/>
      <stop offset="1" stop-color="#88c526"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#12130f"/>
  <rect x="40" y="30" width="1200" height="660" rx="16" fill="url(#bg)" stroke="#3e3d32"/>

  <!-- Header -->
  <rect x="70" y="60" width="1140" height="90" rx="12" fill="url(#header)" stroke="#3e3d32"/>
  <rect x="95" y="77" width="56" height="56" rx="12" fill="#0f172a" stroke="#2dd4bf"/>
  <path d="M110 108 L122 120 L139 96" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="170" y="101" fill="#f8f8f2" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AssetValidator</text>
  <text x="170" y="128" fill="#a6e22e" font-size="16" font-family="Segoe UI, Arial, sans-serif">Modern GUI " Windows + Linux builds " Ready to use</text>

  <!-- Left panels -->
  <rect x="70" y="170" width="680" height="180" rx="10" fill="#2d2e27" stroke="#3e3d32"/>
  <text x="88" y="196" fill="#a6e22e" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Configuration</text>
  <rect x="88" y="210" width="644" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>
  <rect x="88" y="246" width="644" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>
  <rect x="88" y="282" width="316" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>
  <rect x="416" y="282" width="316" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>

  <rect x="70" y="365" width="680" height="130" rx="10" fill="#2d2e27" stroke="#3e3d32"/>
  <text x="88" y="390" fill="#a6e22e" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Database (optional)</text>
  <rect x="88" y="403" width="644" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>
  <rect x="88" y="438" width="644" height="28" rx="6" fill="#1f201b" stroke="#49483e"/>

  <!-- Buttons -->
  <rect x="70" y="510" width="150" height="38" rx="8" fill="#3d3e36" stroke="#5a594a"/>
  <text x="108" y="535" fill="#f8f8f2" font-size="14" font-family="Segoe UI, Arial, sans-serif">Add asset</text>
  <rect x="232" y="510" width="180" height="38" rx="8" fill="#3d3e36" stroke="#5a594a"/>
  <text x="266" y="535" fill="#f8f8f2" font-size="14" font-family="Segoe UI, Arial, sans-serif">Import .txt/.json</text>
  <rect x="424" y="510" width="130" height="38" rx="8" fill="#3d3e36" stroke="#5a594a"/>
  <text x="462" y="535" fill="#f8f8f2" font-size="14" font-family="Segoe UI, Arial, sans-serif">Clear list</text>
  <rect x="588" y="510" width="162" height="38" rx="8" fill="url(#primary)" stroke="#6aae27"/>
  <text x="639" y="535" fill="#1b1d1a" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Validate</text>

  <!-- Right output -->
  <rect x="770" y="170" width="440" height="378" rx="10" fill="#2d2e27" stroke="#3e3d32"/>
  <text x="790" y="196" fill="#fd971f" font-size="15" font-family="Segoe UI, Arial, sans-serif" font-weight="600">Output</text>
  <rect x="790" y="210" width="400" height="318" rx="8" fill="#1f201b" stroke="#49483e"/>
  <text x="806" y="236" fill="#e6db74" font-size="13" font-family="Consolas, monospace">Running... total=12</text>
  <text x="806" y="258" fill="#66d9ef" font-size="13" font-family="Consolas, monospace">4/12  OK dragon</text>
  <text x="806" y="280" fill="#f8f8f2" font-size="13" font-family="Consolas, monospace">5/12  FAIL tree</text>
  <text x="806" y="302" fill="#a6e22e" font-size="13" font-family="Consolas, monospace">Done. passed=11 failed=1</text>

  <!-- Bottom table -->
  <rect x="70" y="560" width="1140" height="100" rx="10" fill="#2d2e27" stroke="#3e3d32"/>
  <rect x="88" y="578" width="1104" height="28" rx="6" fill="#34352e" stroke="#3e3d32"/>
  <text x="108" y="597" fill="#fd971f" font-size="13" font-family="Segoe UI, Arial, sans-serif">Asset</text>
  <text x="360" y="597" fill="#fd971f" font-size="13" font-family="Segoe UI, Arial, sans-serif">Version</text>
  <text x="540" y="597" fill="#fd971f" font-size="13" font-family="Segoe UI, Arial, sans-serif">Relative path</text>
  <rect x="88" y="612" width="1104" height="28" rx="6" fill="#1f201b" stroke="#3e3d32"/>
</svg>

