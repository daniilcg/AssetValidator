name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [ main, master ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Prepare CI log directory
        run: |
          mkdir -p .ci-logs
          echo "ci-logs initialized" > .ci-logs/_heartbeat.txt

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]" 2>&1 | tee .ci-logs/pip_install.txt

      - name: Run tests
        run: |
          set -euxo pipefail
          pytest -vv --showlocals 2>&1 | tee .ci-logs/pytest.txt

      - name: Ruff (lint)
        run: |
          set -euxo pipefail
          ruff check . 2>&1 | tee .ci-logs/ruff_check.txt

      - name: Ruff (format)
        run: |
          set -euxo pipefail
          ruff format --check . 2>&1 | tee .ci-logs/ruff_format.txt

      - name: Mypy
        run: |
          set -euxo pipefail
          mypy . 2>&1 | tee .ci-logs/mypy.txt

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-logs-tests
          path: .ci-logs/**
          if-no-files-found: warn

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Build GUI app
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AssetValidator --add-data "assets/icon.svg;assets" pipeline/gui/app.py

      - name: Build GUI app (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --noconfirm --onefile --windowed --name AssetValidator --add-data "assets/icon.svg:assets" pipeline/gui/app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: AssetValidator-${{ matrix.os }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: AssetValidator-*
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/AssetValidator
            release-assets/**/AssetValidator.exe

